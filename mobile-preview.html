<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Mobile preview</title>
<style>
  body{margin:0;background:#222;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;color:#fff}
  .frame{
    width: 390px; height: 844px;
    border: 8px solid #111;
    border-radius: 36px;
    overflow: hidden;
    box-shadow: 0 30px 80px #0008;
    background: #fff;
  }
  iframe{width:100%; height:100%; border:0; display:block}
  .label{position:fixed; top:16px; left:16px; font-size:14px; opacity:.7}
</style>
</head>
<body>
<div class="label">390×844 mobile preview</div>
<div class="frame">
  <iframe src="./index.html"></iframe>
</div>
</body>
</html>
